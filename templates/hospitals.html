<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospitals Near You — MediFind</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --surface2: #1a2235;
            --border: rgba(255,255,255,0.07);
            --accent: #3b82f6;
            --accent2: #06b6d4;
            --gold: #f59e0b;
            --green: #10b981;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --card-hover: #1e2d45;
            --font-head: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,15,30,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .logo-mark {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .logo-name {
            font-family: var(--font-head);
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        .logo-name span { color: var(--accent2); }
        .nav { display: flex; gap: 0.5rem; }
        .nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.875rem;
            padding: 6px 14px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav a:hover { color: var(--text); background: var(--surface2); }

        /* ── PAGE LAYOUT ── */
        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ── TOP BAR ── */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.875rem;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--surface);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .back-btn:hover { color: var(--text); border-color: var(--accent); }

        .page-meta { flex: 1; }
        .page-title {
            font-family: var(--font-head);
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .page-title span { color: var(--accent2); }
        .page-subtitle {
            color: var(--muted);
            font-size: 0.875rem;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .location-dot {
            width: 8px; height: 8px;
            background: var(--green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
            50% { box-shadow: 0 0 0 6px rgba(16,185,129,0.1); }
        }

        /* ── CONTROLS ── */
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .radius-group {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .radius-btn {
            padding: 8px 18px;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            border-right: 1px solid var(--border);
        }
        .radius-btn:last-child { border-right: none; }
        .radius-btn.active {
            background: var(--accent);
            color: white;
        }
        .radius-btn:hover:not(.active) { color: var(--text); background: var(--surface2); }

        .limit-select {
            padding: 8px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.875rem;
            cursor: pointer;
            outline: none;
        }

        .refresh-btn {
            margin-left: auto;
            padding: 8px 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .refresh-btn:hover { opacity: 0.85; }

        .location-editor {
            width: 100%;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .location-field {
            flex: 1 1 280px;
            min-width: 0;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
        }
        .location-btn {
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .location-btn:hover {
            border-color: rgba(255,255,255,0.16);
        }

        /* ── MAP ── */
        #map {
            width: 100%;
            height: 380px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            overflow: hidden;
        }

        /* ── STATS BAR ── */
        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .stats-bar h2 {
            font-family: var(--font-head);
            font-size: 1.1rem;
            font-weight: 700;
        }
        .stats-bar h2 span { color: var(--accent2); }
        .stats-info { color: var(--muted); font-size: 0.8rem; }

        /* ── SPECIALTY GROUP ── */
        .specialty-group {
            margin-bottom: 2rem;
            animation: fadeUp 0.4s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        .group-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .group-icon.multi   { background: rgba(245,158,11,0.15); }
        .group-icon.special { background: rgba(59,130,246,0.15); }
        .group-icon.general { background: rgba(148,163,184,0.1); }

        .group-label {
            font-family: var(--font-head);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .group-label.multi   { color: var(--gold); }
        .group-label.special { color: var(--accent2); }
        .group-label.general { color: var(--muted); }

        .group-count {
            margin-left: auto;
            font-size: 0.75rem;
            color: var(--muted);
            background: var(--surface2);
            padding: 3px 10px;
            border-radius: 20px;
        }

        /* ── HOSPITAL CARDS GRID ── */
        .hospitals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }

        .hospital-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            transition: all 0.25s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .hospital-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }
        .hospital-card.multi::before  { background: linear-gradient(135deg, rgba(245,158,11,0.06), transparent); }
        .hospital-card.special::before { background: linear-gradient(135deg, rgba(59,130,246,0.06), transparent); }
        .hospital-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.15); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .hospital-card:hover::before { opacity: 1; }

        .hospital-card.multi   { border-left: 3px solid var(--gold); }
        .hospital-card.special { border-left: 3px solid var(--accent); }
        .hospital-card.general { border-left: 3px solid rgba(148,163,184,0.3); }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .card-num {
            font-size: 0.7rem;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 4px;
        }
        .card-name {
            font-family: var(--font-head);
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.3;
            letter-spacing: -0.2px;
        }
        .card-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .card-badge.multi   { background: rgba(245,158,11,0.15); color: var(--gold); }
        .card-badge.special { background: rgba(59,130,246,0.15); color: #93c5fd; }
        .card-badge.general { background: rgba(148,163,184,0.1); color: var(--muted); }

        .card-type {
            display: inline-block;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            color: var(--muted);
        }

        .card-address {
            font-size: 0.8rem;
            color: var(--muted);
            line-height: 1.5;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }
        .card-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .stars {
            display: flex;
            gap: 1px;
        }
        .star { font-size: 11px; line-height: 1; }
        .star.full  { color: #f59e0b; }
        .star.half  { color: #f59e0b; opacity: 0.6; }
        .star.empty { color: #334155; }
        .rating-val { color: #f59e0b; }
        .rating-src { color: var(--dim); font-weight: 400; font-size: 0.7rem; }

        .card-distance {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent2);
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
        }
        .btn-nav, .btn-map-pin {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .btn-nav {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
        }
        .btn-nav:hover { opacity: 0.85; }
        .btn-map-pin {
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
        }
        .btn-map-pin:hover { color: var(--text); border-color: var(--accent); }

        /* ── LOADING & EMPTY ── */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 2rem;
            gap: 1rem;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--surface2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--muted); font-size: 0.9rem; }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
        }
        .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-state h3 { color: var(--text); font-family: var(--font-head); margin-bottom: 0.5rem; }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .page { padding: 1rem; }
            .hospitals-grid { grid-template-columns: 1fr; }
            .page-title { font-size: 1.3rem; }
            #map { height: 260px; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="/" class="logo">
            <div class="logo-mark">🏥</div>
            <div class="logo-name">Medi<span>Find</span></div>
        </a>
        <nav class="nav">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/tips">Tips</a>
            <a href="/contact">Contact</a>
        </nav>
    </div>
</header>

<div class="page">
    <!-- TOP BAR -->
    <div class="top-bar">
        <a href="/" class="back-btn">← Back</a>
        <div class="page-meta">
            <h1 class="page-title" id="pageTitle">Finding <span>Hospitals...</span></h1>
            <p class="page-subtitle">
                <span class="location-dot"></span>
                <span id="pageSubtitle">Detecting your location...</span>
            </p>
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <div class="location-editor">
            <input id="locationInput" class="location-field" type="text" placeholder="Change city, area, or pincode">
            <button class="location-btn" id="updateLocationBtn" type="button">Update Location</button>
            <button class="location-btn" id="currentLocationBtn" type="button">Use Current Location</button>
        </div>
        <div class="radius-group">
            <button class="radius-btn" data-radius="2000">2 km</button>
            <button class="radius-btn active" data-radius="5000">5 km</button>
            <button class="radius-btn" data-radius="10000">10 km</button>
            <button class="radius-btn" data-radius="20000">20 km</button>
        </div>
        <select class="limit-select" id="limitFilter">
            <option value="10">Top 10</option>
            <option value="20" selected>Top 20</option>
            <option value="30">Top 30</option>
        </select>
        <button class="refresh-btn" id="refreshBtn">🔄 Refresh</button>
    </div>

    <!-- MAP -->
    <div id="map"></div>

    <!-- STATS -->
    <div class="stats-bar">
        <h2>Found <span id="resultCount">0</span> hospitals</h2>
        <span class="stats-info" id="resultInfo">Grouped by specialty</span>
    </div>

    <!-- RESULTS -->
    <div id="hospitalsList">
        <div class="loading-state">
            <div class="spinner"></div>
            <div class="loading-text">Searching hospitals near you...</div>
        </div>
    </div>
</div>

<footer style="text-align:center;padding:2rem;color:var(--muted);font-size:0.8rem;border-top:1px solid var(--border);margin-top:3rem;">
    © 2024 MediFind · SSIP Project · Powered by Geoapify
</footer>

<script src="{{ url_for('static', filename='js/hospitals.js') }}"></script>
</body>
</html>
